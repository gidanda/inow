services:
  postgres:
    image: postgres:16-alpine
    container_name: inow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: inow
      POSTGRES_USER: inow
      POSTGRES_PASSWORD: inow
    ports:
      - "5432:5432"
    volumes:
      - inow_postgres_data:/var/lib/postgresql/data

volumes:
  inow_postgres_data:
